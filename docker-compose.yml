version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: oru_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:admin@postgres:5432/oru_erp
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
      - JWT_SECRET=JcMSILOrQE6jKwuNEORXAK1UFky8nWgU7EWVXCzNN0o=
      - VITE_JWT_SECRET=JcMSILOrQE6jKwuNEORXAK1UFky8nWgU7EWVXCzNN0o=
      - CORS_ORIGINS=https://oruerp.com,https://www.oruerp.com,https://get-oru.com,https://www.get-oru.com,http://localhost:5173,http://localhost:3000
      - NODE_ENV=production
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  caddy_data:
  caddy_config:
